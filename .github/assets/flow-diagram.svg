<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <pattern id="grid2" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0L0 0 0 30" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9" fill="none" stroke="#30363d" stroke-width="1.5"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9" fill="none" stroke="#f0883e" stroke-width="1.5"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9" fill="none" stroke="#7ee787" stroke-width="1.5"/>
    </marker>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg2)" rx="16"/>
  <rect width="800" height="400" fill="url(#grid2)" opacity="0.3" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6e7681" letter-spacing="3">HOW FORGE WORKS</text>

  <!-- Stage labels -->
  <text x="135" y="70" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#484f58">Session Start</text>
  <text x="400" y="70" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#484f58">During Coding</text>
  <text x="665" y="70" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#484f58">Session End</text>

  <!-- Resume box -->
  <rect x="45" y="82" width="180" height="90" fill="#0d1f3c" stroke="#58a6ff" stroke-width="1.5" rx="12"/>
  <text x="135" y="117" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#58a6ff" font-weight="700">Resume</text>
  <text x="135" y="140" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#8b949e">Inject top-Q experiences</text>
  <text x="135" y="157" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6e7681">into agent context</text>

  <!-- Detect box -->
  <rect x="310" y="82" width="180" height="90" fill="#2b1d11" stroke="#f0883e" stroke-width="1.5" rx="12"/>
  <text x="400" y="117" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#f0883e" font-weight="700">Detect</text>
  <text x="400" y="140" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#8b949e">Real-time pattern match</text>
  <text x="400" y="157" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6e7681">against known failures</text>

  <!-- Writeback box -->
  <rect x="575" y="82" width="180" height="90" fill="#0d2818" stroke="#7ee787" stroke-width="1.5" rx="12"/>
  <text x="665" y="117" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#7ee787" font-weight="700">Writeback</text>
  <text x="665" y="140" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#8b949e">Analyze transcript</text>
  <text x="665" y="157" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6e7681">Update Q-values</text>

  <!-- Horizontal arrows between boxes -->
  <line x1="225" y1="127" x2="305" y2="127" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="127" x2="570" y2="127" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Animated dots on horizontal arrows -->
  <circle r="2.5" fill="#58a6ff" opacity="0">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M225,127 L305,127"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#f0883e" opacity="0">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M490,127 L570,127" begin="0.8s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- Database cylinder -->
  <g>
    <!-- Glow -->
    <ellipse cx="400" cy="290" rx="110" ry="30" fill="#58a6ff" opacity="0.03">
      <animate attributeName="opacity" values="0.02;0.06;0.02" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Body -->
    <rect x="295" y="270" width="210" height="50" fill="#161b22"/>
    <line x1="295" y1="270" x2="295" y2="320" stroke="#30363d" stroke-width="1"/>
    <line x1="505" y1="270" x2="505" y2="320" stroke="#30363d" stroke-width="1"/>
    <!-- Top ellipse -->
    <ellipse cx="400" cy="270" rx="105" ry="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <!-- Bottom ellipse -->
    <ellipse cx="400" cy="320" rx="105" ry="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Label -->
    <text x="400" y="300" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#c9d1d9" font-weight="700">forge.db</text>
  </g>

  <!-- Vertical arrows: boxes ↔ database -->

  <!-- DB → Resume (feedback: inject) -->
  <path d="M310 280 C 230 270 135 240 135 177" fill="none" stroke="#58a6ff" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-b)" opacity="0.5"/>
  <circle r="2" fill="#58a6ff" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M310,280 C230,270 135,240 135,177"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Detect → DB (record matches) -->
  <path d="M400 177 L400 252" fill="none" stroke="#f0883e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-o)" opacity="0.5"/>
  <circle r="2" fill="#f0883e" opacity="0">
    <animateMotion dur="2s" repeatCount="indefinite" path="M400,177 L400,252" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Writeback → DB (learn) -->
  <path d="M665 177 C 665 240 570 270 490 280" fill="none" stroke="#7ee787" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-g)" opacity="0.5"/>
  <circle r="2" fill="#7ee787" opacity="0">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M665,177 C665,240 570,270 490,280" begin="1s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Q-value formula -->
  <text x="400" y="365" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#58a6ff" filter="url(#glow2)">Q ← Q + α(r - Q)</text>
  <text x="400" y="388" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6e7681">Reinforcement learning · Time decay · A/B format optimization</text>
</svg>
